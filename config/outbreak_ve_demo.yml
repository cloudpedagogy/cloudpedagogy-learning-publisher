module:
  id: OUTBREAK_VE_DEMO
  code: PH_DEMO_01
  title: "Outbreak Investigation and Vaccine Effectiveness"
  description: "Demonstration course showing Word-first structured publishing with public health content."
  default_render_mode: multi_page
  default_subpage_count: 1

sessions:
  - id: OUTBREAK_VE_DEMO-se01
    code: SE01
    title: "Foundations of Outbreak Investigation"
    type: standard
    required: true
    overview: "This session introduces outbreak investigation, vaccination status, and vaccine effectiveness."
    learning_objectives:
      - "Explain why vaccine effectiveness matters in outbreak investigations."
      - "Interpret outbreak data by vaccination status."
      - "Calculate vaccine effectiveness using relative risk."
    render_mode: multi_page

    sections:
      - id: OUTBREAK_VE_DEMO-se01-sec01
        title: "Outbreak Context"
        kind: section_overview
        number: 1
        navigation_style: numbered_subpages
        subpage_count: 1
        subpages:
          - id: OUTBREAK_VE_DEMO-se01-sec01-sp01
            title: "Outbreak Context"
            kind: text_page
            source_docx: "imports/courses/outbreak_ve_demo/docx/01_vaccine_effectiveness_outbreak.docx"

      - id: OUTBREAK_VE_DEMO-se01-sec02
        title: "Measures and Data"
        kind: section_overview
        number: 2
        navigation_style: numbered_subpages
        subpage_count: 1
        subpages:
          - id: OUTBREAK_VE_DEMO-se01-sec02-sp01
            title: "Measures and Data"
            kind: text_page
            source_docx: "imports/courses/outbreak_ve_demo/docx/02_measures_and_data.docx"

      - id: OUTBREAK_VE_DEMO-se01-sec03
        title: "Calculating Vaccine Effectiveness"
        kind: section_overview
        number: 3
        navigation_style: numbered_subpages
        subpage_count: 1
        subpages:
          - id: OUTBREAK_VE_DEMO-se01-sec03-sp01
            title: "Calculating Vaccine Effectiveness"
            kind: text_page
            source_docx: "imports/courses/outbreak_ve_demo/docx/03_calculating_vaccine_effectiveness.docx"

  - id: OUTBREAK_VE_DEMO-se02
    code: SE02
    title: "Interpretation and Communication"
    type: standard
    required: true
    overview: "This session focuses on visualisation, interpretation, and communicating outbreak findings."
    learning_objectives:
      - "Interpret charts and tables used in outbreak analysis."
      - "Recognise assumptions and limitations in vaccine effectiveness estimates."
      - "Communicate findings in a public health context."
    render_mode: multi_page

    sections:
      - id: OUTBREAK_VE_DEMO-se02-sec01
        title: "Visualising Results"
        kind: section_overview
        number: 1
        navigation_style: numbered_subpages
        subpage_count: 1
        subpages:
          - id: OUTBREAK_VE_DEMO-se02-sec01-sp01
            title: "Visualising Results"
            kind: text_page
            source_docx: "imports/courses/outbreak_ve_demo/docx/04_visualising_outbreak_data.docx"

      - id: OUTBREAK_VE_DEMO-se02-sec02
        title: "Interpreting Evidence"
        kind: section_overview
        number: 2
        navigation_style: numbered_subpages
        subpage_count: 1
        subpages:
          - id: OUTBREAK_VE_DEMO-se02-sec02-sp01
            title: "Interpreting Evidence"
            kind: text_page
            source_docx: "imports/courses/outbreak_ve_demo/docx/05_interpreting_vaccine_effectiveness.docx"

      - id: OUTBREAK_VE_DEMO-se02-sec03
        title: "Reporting and Action"
        kind: section_overview
        number: 3
        navigation_style: numbered_subpages
        subpage_count: 1
        subpages:
          - id: OUTBREAK_VE_DEMO-se02-sec03-sp01
            title: "Reporting and Action"
            kind: text_page
            source_docx: "imports/courses/outbreak_ve_demo/docx/06_reporting_and_public_health_action.docx"

standalone_pages:
  - id: OUTBREAK_VE_DEMO-glossary
    title: "Glossary"
    kind: text_page
    source_docx: "imports/courses/outbreak_ve_demo/docx/course_glossary.docx"
